set -g mode-keys vi

# 啟用 256 色與 true color
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# status line
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left "#[bg=#89b4fa,fg=#1e1e2e,bold]  #S #[bg=#1e1e2e,fg=#89b4fa]"
set -g status-right "#[fg=#89b4fa,bg=#1e1e2e]#[bg=#89b4fa,fg=#1e1e2e,bold] %H:%M  %d %b "
set -g status-left-length 30
set -g status-right-length 40

# window tab
set -g window-status-format " #I #W "
set -g window-status-current-format "#[bg=#cba6f7,fg=#1e1e2e,bold]  #I #W "
set -g window-status-style "fg=#6c7086"
set -g window-status-current-style "fg=#1e1e2e"
